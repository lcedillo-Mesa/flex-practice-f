<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Challenge</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- challenge 1 — make the boxes sit in a row -->
    <h2>challenge-1</h2>
    <div class="challenge-1">
      <div class="c-1-b1">b1</div>
      <div class="c-1-b2">b2</div>
      <div class="c-1-b3">b3</div>
    </div>

    <!-- challenge 2 — make the boxes stack in a column -->
    <h2>challenge-2</h2>
    <div class="challenge-2">
      <div class="c-2-b1">b1</div>
      <div class="c-2-b2">b2</div>
      <div class="c-2-b3">b3</div>
    </div>

    <!-- challenge 3 — stack the boxes and centre them vertically -->
    <h2>challenge-3</h2>
    <div class="challenge-3">
      <div class="c-3-b1">b1</div>
      <div class="c-3-b2">b2</div>
      <div class="c-3-b3">b3</div>
    </div>

    <!-- challenge 4 — row of boxes centred horizontally and vertically -->
    <h2>challenge-4</h2>
    <div class="challenge-4">
      <div class="c-4-b1">b1</div>
      <div class="c-4-b2">b2</div>
      <div class="c-4-b3">b3</div>
    </div>

    <!-- challenge 6a — row of boxes centred horizontally -->
    <!-- challenge 6b — column of boxes centred horizontally -->
    <h2>challenge-5</h2>
    <div class="challenge-6a">
      <div class="c-6a-b1">b1</div>
      <div class="c-6a-b2">b2</div>
      <div class="c-6a-b3">b3</div>
    </div>
    <div class="challenge-6b">
      <div class="c-6b-b1">b1</div>
      <div class="c-6b-b2">b2</div>
      <div class="c-6b-b3">b3</div>
    </div>

    <!-- challenge 7 — nested flex: parent is a column, each child is also a flex column with centred boxes -->
    <h2>challenge-6</h2>
    <div class="challenge-7">
      <div class="c-7-child-1">
        <div class="c-7-b1">b1</div>
        <div class="c-7-b2">b2</div>
      </div>
      <div class="c-7-child-2">
        <div class="c-7-b3">b3</div>
        <div class="c-7-b4">b4</div>
      </div>
    </div>

    <!-- challenge 8 — build a page layout: header, sidebar + main, footer. use flex: 1 on main -->
    <h2>challenge-7</h2>
    <div class="challenge-8">
      <div class="c-8-header">header</div>
      <div class="c-8-middle">
        <div class="c-8-sidebar">sidebar</div>
        <div class="c-8-main">main</div>
      </div>
      <div class="c-8-footer">footer</div>
    </div>
  </body>
</html>
